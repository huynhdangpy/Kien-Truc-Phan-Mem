services:
  mongo:
    image: mongo:7
    container_name: monolithic-mongo
    ports:
      - "27017:27017"
    volumes:
      - monolithic_mongo_data:/data/db

  server:
    build: ./server
    container_name: monolithic-server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/food_monolithic}
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongo

  client:
    image: node:20-alpine
    container_name: monolithic-client
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  monolithic_mongo_data:
