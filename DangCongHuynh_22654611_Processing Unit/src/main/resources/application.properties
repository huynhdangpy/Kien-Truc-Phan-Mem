# ============ SERVER CONFIGURATION ============
server.port=8080
spring.application.name=cqrs-system

# ============ DATABASE CONFIGURATION ============
# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/cqrs_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=cqrs_user
spring.datasource.password=cqrs_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============ RABBITMQ CONFIGURATION ============
# RabbitMQ Connection
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# RabbitMQ Listener Configuration
# concurrency: Số lượng consumer threads - tuning cho performance
spring.rabbitmq.listener.simple.concurrency=5
spring.rabbitmq.listener.simple.max-concurrency=20

# RabbitMQ Connection Pool
spring.rabbitmq.connection-timeout=10s
spring.rabbitmq.cache.channel.size=25

# ============ REDIS CONFIGURATION ============
# Redis Server Connection (Using URL format - Spring Boot 3+ compatible)
spring.data.redis.url=redis://localhost:6379/0
spring.data.redis.timeout=2000

# Redis Connection Pool
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=3000

# ============ LOGGING CONFIGURATION ============
# Log Levels
logging.level.root=INFO
logging.level.com.cqrs=DEBUG
logging.level.org.springframework.amqp=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# Log Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log File
logging.file.name=logs/cqrs-application.log
logging.file.max-size=10MB
logging.file.max-history=10

# ============ JACKSON CONFIGURATION ============
# JSON Serialization/Deserialization
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ============ ACTUATOR CONFIGURATION (Monitoring) ============
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============ APPLICATION PROPERTIES ============
# Custom application properties
app.name=CQRS System
app.version=1.0.0
app.cache-ttl=86400
app.max-concurrent-requests=100000
