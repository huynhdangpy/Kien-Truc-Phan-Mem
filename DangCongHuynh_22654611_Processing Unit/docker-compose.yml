version: "3.8"

services:
  # ============ MySQL Database ============
  mysql:
    image: mysql:8.0
    container_name: cqrs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cqrs_db
      MYSQL_USER: cqrs_user
      MYSQL_PASSWORD: cqrs_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - cqrs-network

  # ============ RabbitMQ Message Queue ============
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cqrs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      timeout: 10s
      retries: 5
    networks:
      - cqrs-network

  # ============ Redis Cache ============
  redis:
    image: redis:7-alpine
    container_name: cqrs-redis
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5
    networks:
      - cqrs-network

volumes:
  mysql_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

networks:
  cqrs-network:
    driver: bridge

# ============ QUICK START ============
# docker-compose up -d
#
# Services:
# - MySQL: localhost:3306 (root/root)
# - RabbitMQ: http://localhost:15672 (guest/guest)
# - Redis: localhost:6379
#
# Check health:
# docker-compose ps
#
# Stop all:
# docker-compose down
#
# View logs:
# docker-compose logs -f mysql
# docker-compose logs -f rabbitmq
# docker-compose logs -f redis
